<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProofSpace • Astral Forge</title>
    <style>
        :root {
            --bg: #0a0e1a;
            --panel: #121826;
            --accent: #7dd3fc;
            --violet: #a78bfa;
            --gold: #ffd166;
            --glow: 0 0 25px rgba(125, 211, 252, 0.6);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background: var(--bg);
            color: #e0f0ff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }
        canvas#starfield {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.75;
        }
        .header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(10, 14, 26, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(125, 211, 252, 0.2);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .brand {
            display: flex; align-items: center; gap: 12px;
        }
        .orb {
            width: 52px; height: 52px;
            border-radius: 50%;
            background: conic-gradient(#7dd3fc, #a78bfa, #ffd166, #7dd3fc);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: 900;
            box-shadow: var(--glow), 0 0 40px rgba(167, 139, 250, 0.4);
            animation: pulse 4s infinite;
        }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        h1 { margin: 0; font-size: 2rem; background: linear-gradient(90deg, #7dd3fc, #ffd166); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; }
        button {
            padding: 10px 18px;
            border: none; border-radius: 9999px;
            font-weight: 700; cursor: pointer;
            transition: all 0.3s;
        }
        button.primary {
            background: linear-gradient(90deg, var(--accent), var(--violet));
            color: #0a0e1a;
        }
        button:hover { transform: translateY(-3px); box-shadow: var(--glow); }
        main { max-width: 1400px; margin: 0 auto; padding: 2rem 1.5rem; }
        .section { margin-bottom: 3rem; }
        h2 { color: var(--gold); border-bottom: 2px solid rgba(255,209,102,0.2); padding-bottom: 8px; }
        #vault-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background: linear-gradient(180deg, #1a2338, #121826);
            border: 1px solid rgba(125,211,252,0.25);
            border-radius: 20px;
            padding: 1.5rem;
            transition: all 0.4s cubic-bezier(0.23,1,0.32,1);
            position: relative;
            overflow: hidden;
        }
        .card:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 20px 40px rgba(125,211,252,0.3);
            border-color: var(--accent);
        }
        .card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 60%; height: 60%;
            background: radial-gradient(circle, rgba(255,209,102,0.15), transparent);
            opacity: 0;
            transition: opacity 0.4s;
        }
        .card:hover::before { opacity: 1; }
        .card h3 { margin: 0 0 10px; color: #fff; }
        .modal {
            display: none; position: fixed; inset: 0;
            background: rgba(8,14,30,0.95); backdrop-filter: blur(10px);
            z-index: 200; align-items: center; justify-content: center;
        }
        .modal-content {
            background: #121826; border: 1px solid var(--accent);
            border-radius: 24px; max-width: 700px; width: 90%;
            padding: 2rem; box-shadow: 0 0 60px rgba(125,211,252,0.5);
        }
        #formula-lab {
            background: #0f1626; border-radius: 20px; padding: 2rem;
            border: 1px solid rgba(167,139,250,0.3);
        }
        input, textarea {
            width: 100%; padding: 14px; margin: 10px 0;
            background: #1a2338; border: 1px solid #334155;
            color: #e0f0ff; border-radius: 12px; font-size: 1rem;
        }
        .particle {
            position: absolute; width: 6px; height: 6px;
            background: var(--gold); border-radius: 50%;
            pointer-events: none; animation: particleBurst 1s forwards;
        }
        @keyframes particleBurst {
            to { transform: translate(var(--x), var(--y)); opacity: 0; }
        }
        .fun-message {
            color: var(--gold); font-style: italic; margin-top: 10px;
        }
    </style>
</head>
<body>
    <canvas id="starfield"></canvas>

    <header class="header">
        <div class="brand">
            <div class="orb">✧</div>
            <div>
                <h1>ProofSpace</h1>
                <small style="color:#a5c8ff;">Astral Forge • v6.2 Bling Edition</small>
            </div>
        </div>
        <div class="controls">
            <button onclick="randomTheorem()">🎲 Random Theorem</button>
            <button onclick="toggleEasyMode()" id="easyBtn">📚 Easy Mode: OFF</button>
            <button onclick="showDebug()" class="primary">🛠 Forge Debug</button>
        </div>
    </header>

    <main>
        <div class="section">
            <h2>🌌 Theorem Vault</h2>
            <input type="text" id="search" placeholder="Search theorems..." onkeyup="filterCards()">
            <div id="vault-grid"></div>
        </div>

        <div class="section" id="formula-lab">
            <h2>⚡ Formula Lab • Energy Forge</h2>
            <input type="text" id="expression" placeholder="Enter math expression (e.g. sin(x)^2 + 2x)">
            <button onclick="runFormula()" class="primary" style="width:100%; margin:10px 0;">RUN FORGE</button>
            <div id="lab-result" style="min-height:80px; padding:15px; background:#1a2338; border-radius:12px;"></div>
            <div id="fun-msg" class="fun-message"></div>
        </div>
    </main>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <button onclick="closeModal()" style="float:right; background:none; border:none; font-size:2rem; color:#ccc;">×</button>
            <h2 id="modal-title"></h2>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        // Starfield + floating symbols
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let width, height;
        let stars = [];
        const symbols = ['∫', '∇', '∞', '∂', '∑', 'π', 'Δ'];

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        class Star {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2.5 + 0.8;
                this.speed = Math.random() * 0.4 + 0.1;
                this.symbol = Math.random() < 0.3 ? symbols[Math.floor(Math.random()*symbols.length)] : null;
                this.alpha = Math.random() * 0.7 + 0.3;
            }
            update() {
                this.y += this.speed;
                if (this.y > height) this.reset();
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = '#e0f0ff';
                ctx.fillRect(this.x, this.y, this.size, this.size);
                if (this.symbol) {
                    ctx.font = '18px serif';
                    ctx.fillText(this.symbol, this.x + 8, this.y + 18);
                }
                ctx.restore();
            }
        }

        function initStars() {
            stars = [];
            for (let i = 0; i < 280; i++) {
                stars.push(new Star());
            }
        }

        function animateStars() {
            ctx.fillStyle = 'rgba(10,14,26,0.12)';
            ctx.fillRect(0, 0, width, height);
            stars.forEach(s => { s.update(); s.draw(); });
            requestAnimationFrame(animateStars);
        }

        window.addEventListener('resize', () => { resize(); initStars(); });

        // Sample theorems (more can be added easily)
        let theorems = [
            {
                id: 1,
                title: "Pythagorean Theorem",
                category: "Geometry",
                statement: "In a right triangle, a² + b² = c²",
                explanation: "The square of the hypotenuse equals the sum of squares of the other two sides. Visualizes as areas of squares built on each side.",
                difficulty: "Beginner"
            },
            {
                id: 2,
                title: "Fundamental Theorem of Calculus",
                category: "Calculus",
                statement: "∫_a^b f(x) dx = F(b) - F(a) where F' = f",
                explanation: "Differentiation and integration are inverse operations. This links the area under a curve to the antiderivative.",
                difficulty: "Intermediate"
            },
            {
                id: 3,
                title: "Euler's Identity",
                category: "Complex Analysis",
                statement: "e^{iπ} + 1 = 0",
                explanation: "The most beautiful equation in math, linking e, i, π, 1, and 0 in one elegant line.",
                difficulty: "Advanced"
            }
        ];

        let easyMode = false;

        function renderVault() {
            const grid = document.getElementById('vault-grid');
            grid.innerHTML = '';
            theorems.forEach(th => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <span style="font-size:0.8rem; color:#a5c8ff;">${th.category} • ${th.difficulty}</span>
                    <h3>${th.title}</h3>
                    <p style="margin:12px 0; font-weight:600;">${th.statement}</p>
                    <button onclick="viewTheorem(${th.id})" style="width:100%; margin-top:10px;">View Proof & Explanation</button>
                `;
                grid.appendChild(card);
            });
        }

        function viewTheorem(id) {
            const th = theorems.find(t => t.id === id);
            if (!th) return;
            document.getElementById('modal-title').textContent = th.title;
            document.getElementById('modal-body').innerHTML = `
                <p><strong>Statement:</strong> ${th.statement}</p>
                <p><strong>Explanation:</strong> ${easyMode ? 'Simple version: ' + th.explanation.replace(/complex/gi,'straightforward') : th.explanation}</p>
                <p style="color:#ffd166; margin-top:20px;">✦ This is a key concept for your midterm!</p>
            `;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function filterCards() {
            // Simple client-side filter (add more logic if needed)
            const term = document.getElementById('search').value.toLowerCase();
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                const text = card.textContent.toLowerCase();
                card.style.display = text.includes(term) ? 'block' : 'none';
            });
        }

        function randomTheorem() {
            const random = theorems[Math.floor(Math.random() * theorems.length)];
            viewTheorem(random.id);
        }

        function toggleEasyMode() {
            easyMode = !easyMode;
            document.getElementById('easyBtn').textContent = `📚 Easy Mode: ${easyMode ? 'ON' : 'OFF'}`;
        }

        // Formula Lab with particle burst
        function createParticles(count) {
            const lab = document.getElementById('formula-lab');
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = (Math.random() * 80 + 10) + '%';
                p.style.top = '60%';
                const angle = Math.random() * Math.PI * 2;
                const vel = 60 + Math.random() * 80;
                p.style.setProperty('--x', (Math.cos(angle) * vel) + 'px');
                p.style.setProperty('--y', (Math.sin(angle) * vel - 100) + 'px');
                lab.appendChild(p);
                setTimeout(() => p.remove(), 1200);
            }
        }

        function runFormula() {
            const expr = document.getElementById('expression').value.trim();
            const resultDiv = document.getElementById('lab-result');
            const fun = document.getElementById('fun-msg');

            if (!expr) {
                resultDiv.innerHTML = `<span style="color:#fb7185;">Enter an expression first!</span>`;
                return;
            }

            // Fake smart evaluation (you can extend with math.js later)
            let result = "✓ Computed successfully";
            if (expr.includes('sin') || expr.includes('x^2')) {
                result = "≈ 1.234 (example value)";
            }

            resultDiv.innerHTML = `<strong>Result:</strong> ${result}<br><small style="color:#a5c8ff;">Forge energy stable • Professor approved</small>`;
            fun.textContent = "🔥 Nice work! That’s going to look great on the midterm.";

            createParticles(35); // bling explosion
        }

        function showDebug() {
            alert("🛠 Astral Forge Debug Console\n\nSystem Status: FULLY CHARGED ✨\nTheorems loaded: " + theorems.length + "\nEasy Mode: " + easyMode + "\n\nEverything is working beautifully in the cosmos.");
        }

        // Init everything
        window.onload = () => {
            resize();
            initStars();
            animateStars();
            renderVault();
        };
    </script>
</body>
</html>
